name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        run: |
          rm -rf .buildozer
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: control-obra-apk
          path: bin/*.apk
